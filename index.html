<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPVS — Clinical Practice Verification System</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Pre-hydration theme application to avoid a flash of the wrong theme.
      // Matches ThemeProvider's own logic exactly: only 'dark' is ever
      // applied from storage — no system-preference check, per spec
      // ("only dark and light – no system theme"). Anything else (including
      // a leftover 'system' value from before this spec) resolves to light.
      (function () {
        try {
          var stored = localStorage.getItem('cpvs-theme-preference');
          if (stored === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
